<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - VASTRAA FASHION</title>
  <link rel="stylesheet" href="style.css">
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="brand">
      <img src="C:\Users\Nidhi\Desktop\CODE\vastraa\ChatGPT Image Dec 29, 2025, 01_26_18 PM.png" alt="VASTRAA Logo" class="logo-img">
      <span class="logo-text">VASTRAA FASHION</span>
    </div>

    <nav class="nav-links">
      <a href="index.html" class="nav-item">Home</a>
      <a href="women.html" class="nav-item">Women</a>
      <a href="men.html" class="nav-item">Men</a>
      <a href="kids.html" class="nav-item">Kids</a>
      <a href="contact.html" class="nav-item active">Contact</a>
    </nav>

    <div class="nav-actions">
      <a href="signin.html" class="icon"><i class="fa-regular fa-user"></i></a>
      <a href="cart.html" class="icon"><i class="fa fa-shopping-cart"></i></a>
      <a href="heart.html" class="icon"><i class="fa fa-heart"></i></a>
    </div>
  </header>

  <!-- =========================
       CONTACT PAGE SECTION
  ========================= -->
  <section class="contact-page">
    <div class="contact-overlay"></div>

    <div class="contact-content">
      <h2>Get in Touch</h2>
      <p>We would love to hear from you. Send us a message and we'll get back to you soon!</p>
      <button class="contact-btn" id="openForm">Contact Us</button>
    </div>

    <!-- POPUP FORM -->
    <div class="popup-form" id="popupForm">
      <div class="form-container">
        <span class="close-btn" id="closeForm">&times;</span>
        <h3>Send a Message</h3>
        <form>
          <input type="text" placeholder="Your Name" required>
          <input type="email" placeholder="Your Email" required>
          <textarea placeholder="Your Message" required></textarea>
          <button type="submit">Send</button>
        </form>
      </div>
    </div>
  </section>

  <!-- JS -->
  <script>
    const openBtn = document.getElementById('openForm');
    const closeBtn = document.getElementById('closeForm');
    const popupForm = document.getElementById('popupForm');

    openBtn.addEventListener('click', () => {
      popupForm.style.display = 'flex';
    });

    closeBtn.addEventListener('click', () => {
      popupForm.style.display = 'none';
    });

    // Close form if clicked outside container
    window.addEventListener('click', (e) => {
      if(e.target === popupForm) {
        popupForm.style.display = 'none';
      }
    });
  </script>

</body>
</html>
