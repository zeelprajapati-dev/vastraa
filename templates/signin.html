<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vastraa Fashion</title>
  <link rel="stylesheet" href="css/style.css">
   <link rel="stylesheet" href="css/https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
   <link rel="stylesheet" href="css/https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lora:wght@400;500;700&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="css/https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
/* ===== SIGNIN / SIGNUP STYLING ===== */
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #f5f5f5;
}

.signin-section {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.signin-box {
  background: #fff;
  padding: 40px 30px;
  border-radius: 12px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
  max-width: 400px;
  width: 100%;
  text-align: center;
}

.signin-box h2 {
  font-family: 'Playfair Display', serif;
  margin-bottom: 10px;
  color: #3b2f2f;
}

.signin-box p {
  margin-bottom: 20px;
  color: #555;
}

.signin-box input {
  width: 100%;
  padding: 12px 15px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 14px;
}

.signin-btn {
  width: 100%;
  padding: 12px;
  background: #3b2f2f;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

.signin-btn:hover {
  background: #b38b59;
  transform: scale(1.05);
}

.signin-extra {
  margin-top: 15px;
  font-size: 14px;
}

.signin-extra a {
  color: #3b2f2f;
  text-decoration: none;
  font-weight: 600;
}

.signin-extra a:hover {
  color: #b38b59;
}

.message {
  color: red;
  margin-bottom: 10px;
}
</style>
</head>
<header class="navbar">
  <div class="brand">
    <img src="assets/ChatGPT Image Dec 29, 2025, 01_26_18 PM.png"alt="VASTRAA Logo" class="logo-img">
    <span class="logo-text">VASTRAA FASHION</span>
  </div>

  <nav class="nav-links">
    <a href="index.html" class="nav-item">Home</a>
    <a href="women.html" class="nav-item">Women</a>
    <a href="men.html" class="nav-item">Men</a>
    <a href="kids.html" class="nav-item">Kids</a>
    <a href="contact.html" class="nav-item">Contact</a>
  </nav>

  <div class="nav-actions">
    <a href="signin.html" class="icon"><i class="fa-regular fa-user"></i></a>
    <a href="cart.html" class="icon"><i class="fa fa-shopping-cart"></i></a>
    <a href="heart.html" class="icon"><i class="fa fa-heart"></i></a>
  </div>
</header>
<body>

<section class="signin-section">
  <div class="signin-box">
    <h2 id="formTitle">Welcome Back</h2>
    <p id="formSubtitle">Sign in to continue</p>

    <p class="message" id="message" style="display:none;"></p>

    <form id="signinForm" method="POST" action="/">
      <input type="text" name="fullname" id="fullname" placeholder="Your Name" style="display:none;">
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Password" required>

      <button class="signin-btn" type="submit" id="submitBtn">Sign In</button>
    </form>

    <p class="signin-extra">
      Don’t have an account? <a href="#" id="toggleLink">Create one</a>
    </p>
  </div>
</section>

<script>
// ===== SIGN IN / SIGN UP TOGGLE =====
let isLogin = true;

const toggleLink = document.getElementById('toggleLink');
const formTitle = document.getElementById('formTitle');
const formSubtitle = document.getElementById('formSubtitle');
const fullname = document.getElementById('fullname');
const submitBtn = document.getElementById('submitBtn');

toggleLink.addEventListener('click', function(e){
  e.preventDefault();
  isLogin = !isLogin;

  if(isLogin){
    formTitle.textContent = "Welcome Back";
    formSubtitle.textContent = "Sign in to continue";
    fullname.style.display = "none";
    submitBtn.textContent = "Sign In";
    toggleLink.textContent = "Create one";
    toggleLink.parentElement.firstChild.textContent = "Don’t have an account? ";
  } else {
    formTitle.textContent = "Create Account";
    formSubtitle.textContent = "Sign up to start shopping";
    fullname.style.display = "block";
    submitBtn.textContent = "Sign Up";
    toggleLink.textContent = "Sign in";
    toggleLink.parentElement.firstChild.textContent = "Already have an account? ";
  }
});
</script>

</body>
</html>
