<!DOCTYPE html>
<html>
<head>
    <title>VASTRAA | Users</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            padding: 30px;
        }
        h2 {
            text-align: center;
            color: #3b2f2f;
        }
        table {
            width: 60%;
            margin: auto;
            border-collapse: collapse;
            background: white;
        }
        th, td {
            padding: 12px;
            border: 1px solid #ccc;
            text-align: center;
        }
        th {
            background: #3b2f2f;
            color: white;
        }
    </style>
</head>
<body>

<h2>VASTRAA USERS DATABASE</h2>

<table>
    <tr>
        <th>ID</th>
        <th>Email</th>
    </tr>

    {% for user in users %}
    <tr>
        <td>{{ user[0] }}</td>
        <td>{{ user[1] }}</td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
